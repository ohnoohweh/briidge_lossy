# This manifest is CI/support metadata and therefore lives under .github/ rather than docs/.
# The application-vs-library functional decomposition for REQ-WSP-* is documented in
# docs/ARCHITECTURE.md under "WebSocket proxy tunneling".
# The broader separation between user use-cases, external assumptions, and
# project-owned requirements is documented in docs/SYSTEM_BOUNDARY.md.
# Planned secure-link work is documented in docs/SECURE_LINK_DESIGN.md.
# Future secure-link IDs currently use the PLAN-AUT-* namespace in REQUIREMENTS.md,
# including planned admin/API visibility of secure-link state, so they are
# intentionally excluded from this active REQ-* traceability manifest.
# A narrow PSK prototype and its tests may exist before those planned IDs are
# promoted into the active delivered REQ-* namespace, currently covering
# myudp/tcp/ws/quic happy-path slices plus a two-peer TCP listener slice used to
# validate peer-isolated routing at the secure-link layer.
