# This manifest is CI/support metadata and therefore lives under .github/ rather than docs/.
# NOTE: updated to reflect a small instrumentation/docs change (PR #178)
# NOTE: additionally updated to reflect repository process/PR-style documentation changes (PR #178)
# NOTE: the README is intentionally maintained as a compact coverage snapshot, while
# detailed requirement, design, and testing narrative stays in the dedicated docs.
# NOTE: the PR-185 backport also revalidated the Linux shared xdist slice after
# loopback-isolated harness rewrites and secure-link session-budget fixes in the
# delivered runtime, so the existing REQ-WSP-008/010, REQ-ADM-004/006, and
# REQ-AUT-010 mappings remain defended in the CI-aligned parallel run.
# NOTE: PR #189 additionally hardens the shared integration harness with
# runtime-generated localhost TLS fixtures and availability-aware loopback
# port-block selection. This is a testability/runtime-note update in
# REQUIREMENTS.md; the underlying requirement-to-test mappings remain unchanged.
# The application-vs-library functional decomposition for REQ-WSP-* is documented in
# docs/ARCHITECTURE.md under "WebSocket proxy tunneling".
# The broader separation between user use-cases, external assumptions, and
# project-owned requirements is documented in docs/SYSTEM_BOUNDARY.md.
# Planned secure-link follow-up work is documented in docs/SECURE_LINK_DESIGN.md.
# The delivered secure-link slices now use active REQ-AUT-* IDs for:
# Phase 1 PSK transport-independent protection, Phase 2 certificate/trust-anchor
# validation, and Phase 3 operational reload/apply controls.
# The current WebAdmin secure-link model keeps peer-scoped security state and
# operator rekey actions on the corresponding peer rows, while status/admin
# views are limited to aggregate runtime summary. Peer-card rendering now also
# preserves connection uptime and transport-appropriate protocol statistics
# without exposing the secure-link PSK as an editable config value.
