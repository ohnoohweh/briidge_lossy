name: README_TESTING Guard

on:
  pull_request:
  push:

jobs:
  readme-testing-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run README_TESTING guard on pull requests
        if: github.event_name == 'pull_request'
        run: python scripts/check_readme_testing_guard.py --base-ref "${{ github.event.pull_request.base.sha }}"

      - name: Resolve README_TESTING guard base ref on pushes
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        id: resolve-base
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.before }}"
          if ! git rev-parse --verify --quiet "${base}^{commit}" >/dev/null; then
            fallback="origin/${{ github.event.repository.default_branch }}"
            git fetch --no-tags origin "${{ github.event.repository.default_branch }}"
            base="$(git merge-base HEAD "$fallback")"
          fi
          echo "base=$base" >> "$GITHUB_OUTPUT"

      - name: Run README_TESTING guard on pushes
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: python scripts/check_readme_testing_guard.py --base-ref "${{ steps.resolve-base.outputs.base }}"
