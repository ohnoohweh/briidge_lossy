name: Requirements Guard

on:
  pull_request:
  push:

jobs:
  requirements-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run requirements guard on pull requests
        if: github.event_name == 'pull_request'
        run: python scripts/check_requirements_guard.py --base-ref "${{ github.event.pull_request.base.sha }}"

      - name: Run requirements guard on pushes
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: python scripts/check_requirements_guard.py --base-ref "${{ github.event.before }}"
