name: bridge.py Integration Gate

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-bridge-change:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changed.outputs.changed }}
      swift_changed: ${{ steps.changed.outputs.swift_changed }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Python changes
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ "$base" == "0000000000000000000000000000000000000000" ]]; then
              base="$(git rev-parse "${head}^" 2>/dev/null || true)"
            elif ! git rev-parse --verify --quiet "${base}^{commit}" >/dev/null; then
              git fetch --no-tags origin "${{ github.event.repository.default_branch }}"
              base="$(git merge-base "$head" "origin/${{ github.event.repository.default_branch }}")"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "swift_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${base:-}" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "swift_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "$base" "$head" | grep -Eq '\.py$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

          if git diff --name-only "$base" "$head" | grep -Eq '\.(py|swift)$'; then
            echo "swift_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "swift_changed=false" >> "$GITHUB_OUTPUT"
          fi

  bridge-py-integration-linux:
    name: Integration Gate (Linux shared)
    needs: detect-bridge-change
    if: needs.detect-bridge-change.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: Run Linux shared integration suite
        run: pytest -q -n 16 tests/integration/test_overlay_e2e.py -m "not windows_only"

  bridge-py-integration-windows:
    name: Integration Gate (Windows-specific)
    needs: detect-bridge-change
    if: needs.detect-bridge-change.outputs.changed == 'true'
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: Run Windows-specific integration suite
        shell: bash
        run: pytest -q -n 4 tests/integration/test_overlay_e2e.py -m "windows_only"

  bridge-py-integration-macos-swift-probe:
    name: Integration Gate (macOS Swift probe)
    needs: detect-bridge-change
    if: needs.detect-bridge-change.outputs.swift_changed == 'true'
    runs-on: macos-latest
    steps:
      - name: Verify Swift toolchain
        run: |
          swift --version
          swiftc --version

      - name: Probe required Swift modules
        shell: bash
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT

          cat > "$tmp_dir/CryptoKitProbe.swift" <<'EOF'
          import Foundation
          import CryptoKit
          let digest = SHA256.hash(data: Data("probe".utf8))
          _ = digest
          EOF

          cat > "$tmp_dir/ZlibProbe.swift" <<'EOF'
          import zlib
          _ = Z_NO_FLUSH
          EOF

          swiftc -typecheck "$tmp_dir/CryptoKitProbe.swift"
          swiftc -typecheck "$tmp_dir/ZlibProbe.swift"

  bridge-py-integration-macos-swift:
    name: Integration Gate (macOS Swift-backed)
    needs:
      - detect-bridge-change
      - bridge-py-integration-macos-swift-probe
    if: needs.detect-bridge-change.outputs.swift_changed == 'true'
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Swift toolchain
        run: |
          swift --version
          swiftc --version

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: Run Swift-backed host-side suites
        env:
          PYTHONPATH: src:ios/src
        run: pytest -q tests/unit/test_channel_mux_swift_parity.py ios/tests

  bridge-py-integration-not-required:
    name: Integration Gate (No Python changes)
    needs: detect-bridge-change
    if: needs.detect-bridge-change.outputs.changed != 'true' && needs.detect-bridge-change.outputs.swift_changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: No Python changes
        run: echo "No Python changes; integration gate not required."
