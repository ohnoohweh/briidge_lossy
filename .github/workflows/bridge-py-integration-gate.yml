name: bridge.py Integration Gate

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  detect-bridge-change:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changed.outputs.changed }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect bridge.py changes
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ "$base" == "0000000000000000000000000000000000000000" ]]; then
              base="$(git rev-parse "${head}^" 2>/dev/null || true)"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${base:-}" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "$base" "$head" | grep -Fxq "src/obstacle_bridge/bridge.py"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  bridge-py-integration-linux:
    name: Integration Gate (Linux shared)
    needs: detect-bridge-change
    if: needs.detect-bridge-change.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: Run Linux shared integration suite
        run: pytest -q -n 16 tests/integration/test_overlay_e2e.py -m "not windows_only"

  bridge-py-integration-windows:
    name: Integration Gate (Windows-specific)
    needs: detect-bridge-change
    if: needs.detect-bridge-change.outputs.changed == 'true'
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: Run Windows-specific integration suite
        shell: bash
        run: pytest -q -n 4 tests/integration/test_overlay_e2e.py -m "windows_only"

  bridge-py-integration-not-required:
    name: Integration Gate (No bridge.py changes)
    needs: detect-bridge-change
    if: needs.detect-bridge-change.outputs.changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: No bridge.py changes
        run: echo "src/obstacle_bridge/bridge.py unchanged; integration gate not required."
