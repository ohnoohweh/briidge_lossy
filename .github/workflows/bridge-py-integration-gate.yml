name: bridge.py Integration Gate

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  bridge-py-integration-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect bridge.py changes
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ "$base" == "0000000000000000000000000000000000000000" ]]; then
              base="$(git rev-parse "${head}^" 2>/dev/null || true)"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${base:-}" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "$base" "$head" | grep -Fxq "src/obstacle_bridge/bridge.py"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.changed.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        if: steps.changed.outputs.changed == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: Run full integration suite
        if: steps.changed.outputs.changed == 'true'
        run: pytest -q -n 16 tests/integration/test_overlay_e2e.py

      - name: No bridge.py changes
        if: steps.changed.outputs.changed != 'true'
        run: echo "src/obstacle_bridge/bridge.py unchanged; integration gate not required."
